<!DOCTYPE html>
<html>
<head>
  <title>Add Property</title>
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #f70a0a; /* Aapka dark background */
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center; /* Horizontally center */
    align-items: center;     /* Vertically center */
    min-height: 100vh;
}

.form-container {
    background: #ffffff;
    width: 100%;
    max-width: 400px; /* Card ki width */
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 25px;
    font-weight: 600;
}

form {
    display: flex;
    flex-direction: column; /* Sab kuch ek ke niche ek */
    gap: 15px; /* Fields ke beech barabar gap */
}

.input-group {
    width: 100%;
}

input, select {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #007bff;
    box-shadow: 0 0 5px rgba(0,123,255,0.3);
}

.submit-btn {
    background-color: #007bff;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s ease;
}

.submit-btn:hover {
    background-color: #0056b3;
}

label {
    font-size: 13px;
    color: #666;
    margin-bottom: 5px;
    display: block;
}

  </style>
</head>
<body>
    <meta name="viewport"
content="width=device-width, initial-scale=1.0">
    <div class="form-container">
    <h2>Add Property</h2>

    <form action="/add-property" method="POST" enctype="multipart/form-data">
    
      <select name="propertyType" required>
        <option value="">Select Property Type</option>
        <option value="House">House</option>
        <option value="Flat">Flat</option>
        <option value="Plot">Plot</option>
        <option value="Villa">Villa</option>
      </select>
    
      <select name="dealType" required>
        <option value="">Select Deal Type</option>
        <option value="Sell">Sell</option>
        <option value="Rent">Rent</option>
      </select>
    
      <input type="text" name="location" placeholder="Location" required>
      <input type="number" name="price" placeholder="Price" required>
      <input type="tel" name="contact" 
      placeholder="Enter 10 digit mobile number"
      pattern="[0-9]{10}"
      maxlength="10"
      required>

      <input 
  type="file" 
  name="images" 
  multiple
  required
>
    
      <button type="submit">Add Property</button>
    </form>
    

</body>
</html>
